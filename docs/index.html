<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>TB-AMR-MTBC-Phylogenomics Reports</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root{
      --bg:#ffffff; --ink:#0f172a; --muted:#64748b; --line:#e5e7eb; --card:#ffffff; --chip:#f1f5f9; --accent:#0ea5e9;
      --shadow:0 1px 2px rgba(15,23,42,.06), 0 4px 12px rgba(15,23,42,.04)
    }
    @media (prefers-color-scheme: dark){
      :root{ --bg:#0b1220; --ink:#e5e7eb; --muted:#94a3b8; --line:#1f2937; --card:#0f172a; --chip:#111827; --accent:#38bdf8; --shadow:none }
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font:16px/1.5 system-ui}

    .wrap{max-width:1100px;margin:auto;padding:28px 20px}

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
      gap:16px;
    }

    .card{
      display:block;
      text-decoration:none;
      color:inherit;
      border:1px solid var(--line);
      border-radius:16px;
      padding:18px;
      background:var(--card);
    }

    .title{font-weight:700;margin-top:10px}

    .icon img{
      width:40px;
      border-radius:8px;
    }

  </style>
</head>

<body>
  <div class="wrap">

    <div id="cards" class="grid">

      <!-- Dataset 1 -->
      <a class="card"
         href="./reports/mtbc_training_2026.html"
         data-name="mtbc tuberculosis training dataset may 2026 batch1">

        <div class="icon">
          <img id="mtb-img-1"
               src="assets/Mycobacterium_tuberculosis.png">
        </div>

        <div class="title">
          Mycobacterium tuberculosis — Training dataset (May 2026)
        </div>
      </a>

      <!-- Dataset 2 -->
      <a class="card"
         href="./reports/Mycobacterium_tuberculosis_report.html"
         data-name="mtbc tuberculosis training dataset may 2026 batch2">

        <div class="icon">
          <img id="mtb-img-2"
               src="assets/Mycobacterium_tuberculosis.png">
        </div>

        <div class="title">
          Mycobacterium tuberculosis — Training dataset 2 (May 2026)
        </div>
      </a>

    </div>

  </div>

  <script>
    function setupFallback(id, candidates) {
      const img = document.getElementById(id);
      if (!img) return;
      let i = 0;
      img.onerror = () => {
        i++;
        if (i < candidates.length) img.src = candidates[i];
      };
    }

    setupFallback('mtb-img-1', ['assets/Mycobacterium_tuberculosis.png']);
    setupFallback('mtb-img-2', ['assets/Mycobacterium_tuberculosis.png']);
  </script>

</body>
</html>
